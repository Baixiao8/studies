name: Build and Deploy to GitHub Pages

# 触发条件:push 源 / yaml 到 main 时触发
on:
  push:
    branches: [main]
    paths:
      - 'reports/**'
      - '_shared/**'
      - 'index.html'
      - 'tools/requirements.txt'
      - '.github/workflows/build-and-deploy.yml'

  # 允许手动触发(测试 / 强制 rebuild)
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 必须给 CI 写权限,才能 push gh-pages 分支
    permissions:
      contents: write

    # 防多次 push 时 CI 重叠,取消旧的
    concurrency:
      group: build-and-deploy-${{ github.ref }}
      cancel-in-progress: true

    steps:
      # ─── 1. Checkout 源 ───────────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ─── 2. Python ────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'tools/requirements.txt'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r tools/requirements.txt

      # ─── 3. Playwright Chromium(缓存)────────────────────
      - name: Cache Playwright Chromium
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('tools/requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      # ─── 4. Build all reports(HTML + EPUB)───────────────
      - name: Build all reports
        run: |
          set -e
          for slug_dir in reports/*/; do
            slug=$(basename "$slug_dir")
            # 跳过下划线开头的目录(如 _legacy)
            if [[ "$slug" == _* ]]; then continue; fi
            # 必须有 chapters/ 才认为是 report
            if [ ! -d "$slug_dir/chapters" ]; then continue; fi
            echo "::group::Building $slug"
            python3 _shared/build.py "$slug_dir"
            echo "::endgroup::"
          done

      # ─── 5. 准备 deploy 目录 ──────────────────────────────
      # gh-pages 分支只放 Pages 需要的:首页 + reports/<slug>/index.html + .epub + assets/
      # 不放 _shared/ / parts/ / chapters/ / tools/ / docs/ / *.md 等源/工具
      - name: Prepare deploy directory
        run: |
          rm -rf .deploy
          mkdir -p .deploy

          # 首页
          cp index.html .deploy/

          # .nojekyll(Pages 不走 Jekyll,直接 serve)
          touch .deploy/.nojekyll

          # 每个 report 的产物 + assets
          # A 模式: 有 chapters/ → 用 CI build 装配出的 index.html + epub + assets/
          # B 模式: 无 chapters/ → 单文件 SPA,index.html 是源,整目录 mirror(排除元数据/源材料)
          for slug_dir in reports/*/; do
            slug=$(basename "$slug_dir")
            if [[ "$slug" == _* ]]; then continue; fi
            if [ ! -f "$slug_dir/index.html" ]; then continue; fi
            mkdir -p ".deploy/reports/$slug"

            if [ -d "$slug_dir/chapters" ]; then
              # A 模式
              cp "$slug_dir/index.html" ".deploy/reports/$slug/"
              if compgen -G "$slug_dir/*.epub" > /dev/null; then
                cp "$slug_dir"/*.epub ".deploy/reports/$slug/"
              fi
              if [ -d "$slug_dir/assets" ]; then
                cp -r "$slug_dir/assets" ".deploy/reports/$slug/"
              fi
            else
              # B 模式 · 单文件 SPA 整目录 mirror
              rsync -a \
                --exclude='*.md' \
                --exclude='项目文档.md' \
                --exclude='archive/' \
                --exclude='generation/' \
                --exclude='knowledge/' \
                --exclude='memory/' \
                --exclude='source.pdf' \
                --exclude='.git*' \
                --exclude='__pycache__/' \
                --exclude='.DS_Store' \
                "$slug_dir" ".deploy/reports/$slug/"
            fi
          done

          echo "::group::Deploy directory contents"
          find .deploy -type f | sort
          du -sh .deploy
          echo "::endgroup::"

      # ─── 6. 部署到 gh-pages 分支 ──────────────────────────
      # force_orphan: true · 每次 deploy 都是 orphan commit,gh-pages 不累积历史
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.deploy
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: rebuild from ${{ github.sha }}'

      # ─── 7. Summary ───────────────────────────────────────
      - name: Summary
        run: |
          echo "## 🚀 Build & Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Live: https://baixiao8.github.io/studies/" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Source commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 Deployed at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed contents:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          (cd .deploy && find . -maxdepth 3 -type f | sort) >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
